<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthony Kuiau</title>
  <meta name="description" content="Anthony Kuiau — Graphic Designer & Radio Presenter" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- LOADING -->
  <div id="loading" role="status" aria-label="Loading">
    <div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>

  <!-- NAV -->
  <nav id="nav" aria-label="Main navigation">
    <a href="#hero" class="nav-logo">A<span>.</span>K</a>
    <ul class="nav-links" role="list">
      <li><a href="#about">About</a></li>
      <li><a href="#portfolio">Work</a></li>
      <li><a href="#cv">Resume</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="burger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE DRAWER -->
  <div class="drawer" role="dialog" aria-modal="true" aria-label="Mobile navigation">
    <a href="#about">About</a>
    <a href="#portfolio">Work</a>
    <a href="#cv">Resume</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- HERO -->
  <section id="hero" aria-label="Introduction">
    <div class="hero-inner">
      <p class="hero-tag reveal" id="hero-tag"></p>
      <h1 class="hero-name reveal" id="hero-name"></h1>
      <p class="hero-sub reveal" id="hero-sub"></p>
      <div class="hero-ctas reveal">
        <a href="#portfolio" class="btn btn-fill" id="hero-cta-primary"></a>
        <a href="#contact"   class="btn btn-ghost" id="hero-cta-secondary"></a>
      </div>
    </div>
    <div class="hero-scroll" aria-hidden="true">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- ABOUT -->
  <section id="about" aria-label="About Anthony">
    <div class="section-wrap">
      <p class="eyebrow reveal" id="about-eyebrow"></p>
      <h2 class="section-heading reveal" id="about-heading"></h2>
      <div class="about-grid">
        <div class="about-text reveal" id="about-paragraphs"></div>
        <div class="about-stats reveal" id="about-stats"></div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- PORTFOLIO -->
  <section id="portfolio" aria-label="Portfolio">
    <div class="section-wrap">
      <p class="eyebrow reveal" id="portfolio-eyebrow"></p>
      <h2 class="section-heading reveal" id="portfolio-heading"></h2>
      <div class="port-filters reveal" id="port-filters" role="group" aria-label="Filter projects"></div>
      <div class="port-grid" id="port-grid"></div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- EXPERIENCE -->
  <section id="cv" aria-label="Experience and Skills">
    <div class="section-wrap">
      <p class="eyebrow reveal" id="cv-eyebrow"></p>
      <h2 class="section-heading reveal" id="cv-heading"></h2>
      <div class="cv-grid">
        <div class="timeline reveal" id="timeline"></div>
        <div class="skills-block reveal" id="skills-block"></div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- CONTACT -->
  <section id="contact" aria-label="Contact">
    <div class="section-wrap">
      <div class="contact-inner">
        <p class="eyebrow reveal" id="contact-eyebrow"></p>
        <h2 class="section-heading reveal" id="contact-heading"></h2>
        <p class="contact-body reveal" id="contact-body"></p>
        <a class="contact-email reveal" aria-label="Send email"></a>
        <div class="contact-ctas reveal">
          <a id="cv-download" class="btn btn-fill" target="_blank" rel="noopener">Download CV</a>
          <a id="contact-email-btn" class="btn btn-ghost">Email me</a>
        </div>
        <div class="social-row reveal" id="socials"></div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Anthony Kuiau. All rights reserved.</p>
    <p>Designed &amp; built by <span>Anthony Kuiau</span></p>
  </footer>

  <!-- Firebase App.js (ES module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
